name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build_flag: --linux
            artifact_name: Anvil-MC-linux
            artifact_path: dist/linux/Anvil-MC
          - os: macos-latest
            build_flag: --macos
            artifact_name: Anvil-MC-macos
            artifact_path: dist/macos/Anvil-MC
          - os: windows-latest
            build_flag: --windows
            artifact_name: Anvil-MC-windows
            artifact_path: dist/windows/Anvil-MC.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y ccache python3-dev patchelf

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ccache

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka setuptools
          pip install -e .

      - name: Build with Nuitka
        run: python build/build_nuitka.py ${{ matrix.build_flag }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
