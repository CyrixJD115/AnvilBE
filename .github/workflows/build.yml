name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            build_flag: --linux
            artifact_name: Anvil-MC-linux
            artifact_path: dist/linux/Anvil-MC
            nuitka_cache: ~/.cache/Nuitka
          - os: macos-latest
            build_flag: --macos
            artifact_name: Anvil-MC-macos
            artifact_path: dist/macos/Anvil-MC.app
            nuitka_cache: ~/Library/Caches/Nuitka
          - os: windows-latest
            build_flag: --windows
            artifact_name: Anvil-MC-windows
            artifact_path: dist/windows/Anvil-MC.exe
            nuitka_cache: ~\AppData\Local\Nuitka

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        shell: python
        run: |
          import re, os
          with open("version.yaml") as f:
              m = re.search(r'^version:\s*(.+)$', f.read(), re.MULTILINE)
              ver = m.group(1).strip().strip('"\'') if m else "0.0.0"
              clean = re.sub(r'(\s+|-)[a-zA-Z].*', '', ver).strip() or ver
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={ver}\n")
              f.write(f"version_clean={clean}\n")

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Cache Nuitka
        uses: actions/cache@v5
        with:
          path: ${{ matrix.nuitka_cache }}
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y ccache python3-dev patchelf

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ccache

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka setuptools imageio
          pip install -e .

      - name: Build with Nuitka
        run: python build/build_nuitka.py ${{ matrix.build_flag }} --version "${{ steps.version.outputs.version }}"

      - name: Prepare macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "=== dist/macos contents ==="
          ls -la dist/macos/ || true
          if [ -d "dist/macos/main.app" ] && [ ! -d "dist/macos/Anvil-MC.app" ]; then
            mv "dist/macos/main.app" "dist/macos/Anvil-MC.app"
            echo "Renamed main.app -> Anvil-MC.app"
          fi
          echo "=== final contents ==="
          ls -la dist/macos/ || true

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}
          path: ${{ matrix.artifact_path }}
