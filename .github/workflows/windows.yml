name: Build (Windows)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 7.0.3)"
        required: true
        type: string
      description:
        description: "Build description (e.g. Hotfix memory leak)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Cache Nuitka
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka setuptools imageio
          pip install -e .

      - name: Build with Nuitka
        run: python build/build_nuitka.py --windows --version ${{ inputs.version || '7.0.2' }}

      - name: Sanitize description for artifact name
        id: label
        shell: python
        if: inputs.description != ''
        run: |
          import os, re
          cleaned = re.sub(r'[^a-zA-Z0-9]+', '-', "${{ inputs.description }}").strip('-').lower()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"suffix=-{cleaned}\n")

      - uses: actions/upload-artifact@v6
        with:
          name: Anvil-MC-windows-${{ inputs.version || '7.0.2' }}${{ steps.label.outputs.suffix }}
          path: dist/windows/Anvil-MC.exe
