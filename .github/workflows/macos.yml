name: Build (macOS)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 7.0.3)"
        required: true
        type: string
      description:
        description: "Build description (e.g. Hotfix memory leak)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        shell: python
        run: |
          import re, os
          with open("version.yaml") as f:
              m = re.search(r'^version:\s*(.+)$', f.read(), re.MULTILINE)
              ver = m.group(1).strip().strip('"\'') if m else "0.0.0"
              clean = re.sub(r'(\s+|-)[a-zA-Z].*', '', ver).strip() or ver
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={ver}\n")
              f.write(f"version_clean={clean}\n")

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Cache Nuitka
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-nuitka-

      - name: Install system deps
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install ccache

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka setuptools imageio
          pip install -e .

      - name: Build with Nuitka
        run: python build/build_nuitka.py --macos --version "${{ inputs.version || steps.version.outputs.version }}"

      - name: Prepare macOS artifact
        shell: bash
        run: |
          echo "=== dist/macos contents ==="
          ls -la dist/macos/ || true
          if [ -d "dist/macos/main.app" ] && [ ! -d "dist/macos/Anvil-MC.app" ]; then
            mv "dist/macos/main.app" "dist/macos/Anvil-MC.app"
            echo "Renamed main.app -> Anvil-MC.app"
          fi
          echo "=== final contents ==="
          ls -la dist/macos/ || true

      - name: Sanitize description for artifact name
        id: label
        shell: python
        if: inputs.description != ''
        run: |
          import os, re
          cleaned = re.sub(r'[^a-zA-Z0-9]+', '-', "${{ inputs.description }}").strip('-').lower()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"suffix=-{cleaned}\n")

      - uses: actions/upload-artifact@v6
        with:
          name: Anvil-MC-macos-${{ inputs.version || steps.version.outputs.version }}${{ steps.label.outputs.suffix }}
          path: dist/macos/Anvil-MC.app
